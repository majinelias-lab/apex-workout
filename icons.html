<!DOCTYPE html>

<html>
<head><title>Generate APEX Icons</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  // Background
  ctx.fillStyle = '#080808';
  ctx.fillRect(0, 0, s, s);
  // Rounded rect border
  ctx.strokeStyle = '#c8ff00';
  ctx.lineWidth = s * 0.03;
  const r = s * 0.12;
  const pad = s * 0.06;
  ctx.beginPath();
  ctx.moveTo(pad + r, pad);
  ctx.lineTo(s - pad - r, pad);
  ctx.arcTo(s-pad, pad, s-pad, pad+r, r);
  ctx.lineTo(s-pad, s-pad-r);
  ctx.arcTo(s-pad, s-pad, s-pad-r, s-pad, r);
  ctx.lineTo(pad+r, s-pad);
  ctx.arcTo(pad, s-pad, pad, s-pad-r, r);
  ctx.lineTo(pad, pad+r);
  ctx.arcTo(pad, pad, pad+r, pad, r);
  ctx.closePath();
  ctx.stroke();
  // APEX text
  ctx.fillStyle = '#c8ff00';
  ctx.font = `bold ${s * 0.32}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('APEX', s/2, s/2);
}

const c192 = document.getElementById(‘c192’);
const c512 = document.getElementById(‘c512’);
drawIcon(c192, 192);
drawIcon(c512, 512);

// Download both
function download(canvas, name) {
const a = document.createElement(‘a’);
a.download = name;
a.href = canvas.toDataURL(‘image/png’);
a.click();
}

download(c192, ‘icon-192.png’);
setTimeout(() => download(c512, ‘icon-512.png’), 500);
</script>

</body>
</html>
